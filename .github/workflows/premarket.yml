name: Pre-market Brief

# NSE opens 09:15 IST (03:45 UTC). Run at 03:15 UTC (08:45 IST) on weekdays to
# refresh overnight news/sentiment/macro and re-check active positions BEFORE the
# open. No new buy signals are generated (prices update only after the open).
on:
  schedule:
    - cron: "15 3 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even on a non-trading day"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: premarket-brief
  cancel-in-progress: false

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Kolkata
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies (lean)
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas>=2.1" "numpy>=1.26" "scipy>=1.11" "PyYAML>=6.0" "pydantic>=2.6" \
            "python-dateutil>=2.8" "requests>=2.31" "SQLAlchemy>=2.0" \
            "yfinance>=0.2.40" "nsepython>=2.9" "feedparser>=6.0" \
            "beautifulsoup4>=4.12" "lxml>=5.0" "anthropic>=0.40"

      - name: Run pre-market brief
        run: |
          python -m scheduler.run_eod --mode premarket ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      - name: Persist SQLite database
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add -f data/swing.db || true
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "Pre-market brief update [skip ci]"
            git push
          fi
