name: EOD Swing Signals

# NSE closes 15:30 IST (10:00 UTC). Run at 10:30 UTC on weekdays for a buffer.
# (The job itself skips weekday NSE holidays — see run_eod.py.)
on:
  schedule:
    - cron: "30 10 * * 1-5"
  workflow_dispatch:        # manual "Run workflow" button
    inputs:
      force:
        description: "Run even on a non-trading day"
        type: boolean
        default: false

# Allow the job to commit the updated SQLite DB back to the repo.
permissions:
  contents: write

concurrency:
  group: eod-signals
  cancel-in-progress: false

jobs:
  run-eod:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Kolkata
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # Claude news sentiment
      MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}            # optional ticker-tagged news
      # Optional providers (only if you switch primary_price_source):
      UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
      DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
      DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies (lean — no ML/dashboard libs)
        # FinBERT (transformers+torch) is intentionally skipped in CI for speed;
        # sentiment falls back to the lexicon scorer. Add them here if you want
        # model-based sentiment in the unattended run.
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas>=2.1" "numpy>=1.26" "scipy>=1.11" "PyYAML>=6.0" "pydantic>=2.6" \
            "python-dateutil>=2.8" "requests>=2.31" "SQLAlchemy>=2.0" \
            "yfinance>=0.2.40" "nsepython>=2.9" "jugaad-data>=0.26" \
            "feedparser>=6.0" "beautifulsoup4>=4.12" "lxml>=5.0" "anthropic>=0.40"

      - name: Run EOD pipeline
        run: |
          python -m scheduler.run_eod ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      - name: Persist SQLite database
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add -f data/swing.db || true
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "EOD signals update [skip ci]"
            git push
          fi
